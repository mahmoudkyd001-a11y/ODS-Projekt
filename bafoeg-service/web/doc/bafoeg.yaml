openapi: "3.0.0"
info:
  title: BAföG Antrag
  version: "1.0.0"
  description: "Antrag auf Ausbildungsförderung nach dem Bundesausbildungsförderungsgesetz (BAföG)"

paths:
  /index.html:
    get:
      operationId: getIndex
      summary: Startseite anzeigen
      tags:
        - builtin
      responses:
        "200":
          description: Startseite

  /:
    get:
      operationId: getRoot
      summary: Weiterleitung zur Startseite
      tags:
        - builtin
      responses:
        "200":
          description: Startseite

  /bafoeg:
    get:
      operationId: getBafoegForm
      summary: BAföG Antrag anzeigen
      responses:
        "200":
          description: Formular anzeigen
    post:
      operationId: createBafoeg
      summary: BAföG Antrag einreichen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Bafoeg"
      responses:
        "201":
          description: Antrag erstellt

  /bafoeg/{id}:
    get:
      operationId: getBafoegById
      summary: Antrag nach ID abrufen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Antrag gefunden
    delete:
      operationId: deleteBafoegById
      summary: Antrag löschen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Antrag gelöscht

