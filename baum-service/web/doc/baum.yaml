          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 2
        email:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 3
        adresse:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 4
        baumart:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "baum"
          x-ui-order: 5
        baumhoehe:
          type: integer
