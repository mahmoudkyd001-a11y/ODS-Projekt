openapi: "3.0.0"
info:
  title: Baumfaellantrag
  version: "3.0.0"
  description: "Antrag auf Genehmigung zur Fällung, zum Rückschnitt oder zur Kronenpflege eines Baumes nach kommunaler Baumschutzsatzung"

paths:
  /index.html:
    get:
      operationId: getIndex
      summary: Startseite anzeigen
      tags:
        - builtin
      responses:
        "200":
          description: Startseite

  /:
    get:
      operationId: getRoot
      summary: Weiterleitung zur Startseite
      tags:
        - builtin
      responses:
        "200":
          description: Startseite

  /baumfaellung:
    get:
      operationId: getBaumfaellungForm
      summary: Baumfällantrag anzeigen
      responses:
        "200":
          description: Formular anzeigen
    post:
      operationId: createBaumfaellung
      summary: Baumfällantrag einreichen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Baumfaellung"
      responses:
        "201":
          description: Antrag erstellt

  /baumfaellung/{id}:
    get:
      operationId: getBaumfaellungById
      summary: Antrag nach ID abrufen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Antrag gefunden
    delete:
      operationId: deleteBaumfaellungById
      summary: Antrag löschen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Antrag gelöscht

components:
  schemas:
    Baumfaellung:
      type: object
      x-label: "form"
      properties:

        # ─── ABSCHNITT 1: PERSÖNLICHE ANGABEN DES ANTRAGSTELLERS ────────────
        vorname:
          type: string
          x-ui-control: input
          x-ui-order: 1
          x-ui-group: "Abschnitt 1 - Persönliche Angaben"
          x-ui-required: true
          x-ui-placeholder: "z.B. Max"
          x-ui-label: "Vorname"

        nachname:
          type: string
          x-ui-control: input
          x-ui-order: 2
          x-ui-group: "Abschnitt 1 - Persönliche Angaben"
          x-ui-required: true
          x-ui-placeholder: "z.B. Mustermann"
          x-ui-label: "Nachname"

        email:
          type: string
          x-ui-control: email
          x-ui-order: 3
          x-ui-group: "Abschnitt 1 - Persönliche Angaben"
          x-ui-required: true
          x-ui-placeholder: "max.mustermann@email.de"
          x-ui-label: "E-Mail Adresse"

        telefon:
          type: string
          x-ui-control: tel
          x-ui-order: 4
          x-ui-group: "Abschnitt 1 - Persönliche Angaben"
          x-ui-placeholder: "z.B. +49 30 12345678"
          x-ui-label: "Telefonnummer"

        antragstellerrolle:
          type: string
          x-ui-control: select
          x-ui-order: 5
          x-ui-group: "Abschnitt 1 - Persönliche Angaben"
          x-ui-required: true
          x-ui-label: "Ich stelle den Antrag als"
          x-ui-options: ["Grundstückseigentümer","Bevollmächtigter","Mieter mit Zustimmung des Eigentümers","Hausverwaltung"]

        # ─── ABSCHNITT 2: ANSCHRIFT ──────────────────────────────────────────
        strasse_hausnummer:
          type: string
          x-ui-control: input
          x-ui-order: 6
          x-ui-group: "Abschnitt 2 - Anschrift"
          x-ui-required: true
          x-ui-placeholder: "z.B. Musterstraße 12"
          x-ui-label: "Straße und Hausnummer"

        postleitzahl:
          type: string
          x-ui-control: input
          x-ui-order: 7
          x-ui-group: "Abschnitt 2 - Anschrift"
          x-ui-required: true
          x-ui-placeholder: "z.B. 10115"
          x-ui-label: "Postleitzahl"

        wohnort:
          type: string
          x-ui-control: input
          x-ui-order: 8
          x-ui-group: "Abschnitt 2 - Anschrift"
          x-ui-required: true
          x-ui-placeholder: "z.B. Berlin"
          x-ui-label: "Wohnort"

        # ─── ABSCHNITT 3: ANGABEN ZUM GRUNDSTÜCK ────────────────────────────
        grundstuecksadresse:
          type: string
          x-ui-control: input
          x-ui-order: 9
          x-ui-group: "Abschnitt 3 - Angaben zum Grundstück"
          x-ui-required: true
          x-ui-placeholder: "Straße, Hausnummer, PLZ, Ort des Baumstandorts"
          x-ui-label: "Adresse des Grundstücks (Baumstandort)"

        flurstuecksnummer:
          type: string
          x-ui-control: input
          x-ui-order: 10
          x-ui-group: "Abschnitt 3 - Angaben zum Grundstück"
          x-ui-placeholder: "z.B. Flur 3, Flurstück 145"
          x-ui-label: "Flurstücksnummer (falls bekannt)"

        eigentuemer:
          type: string
          x-ui-control: input
          x-ui-order: 11
          x-ui-group: "Abschnitt 3 - Angaben zum Grundstück"
          x-ui-required: true
          x-ui-placeholder: "Name des Grundstückseigentümers"
          x-ui-label: "Eigentümer des Grundstücks"

        grundstuecksart:
          type: string
          x-ui-control: select
          x-ui-order: 12
          x-ui-group: "Abschnitt 3 - Angaben zum Grundstück"
          x-ui-required: true
          x-ui-label: "Art des Grundstücks"
          x-ui-options: ["Privatgrundstück","Gewerbegrundstück","Öffentliche Fläche","Gemeinschaftsgrundstück (WEG)"]

        # ─── ABSCHNITT 4: ANGABEN ZUM BAUM ───────────────────────────────────
        baumart:
          type: string
          x-ui-control: input
          x-ui-order: 13
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-required: true
          x-ui-placeholder: "z.B. Eiche, Buche, Birke"
          x-ui-label: "Baumart"

        anzahl_baeume:
          type: integer
          x-ui-control: number
          x-ui-order: 14
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-required: true
          x-ui-placeholder: "z.B. 1"
          x-ui-label: "Anzahl der betroffenen Bäume"

        baumhoehe:
          type: number
          x-ui-control: number
          x-ui-order: 15
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-required: true
          x-ui-placeholder: "z.B. 12"
          x-ui-label: "Baumhöhe in Metern"

        baumumfang:
          type: integer
          x-ui-control: number
          x-ui-order: 16
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-placeholder: "z.B. 80"
          x-ui-label: "Stammumfang in cm (gemessen auf 1m Höhe)"

        geschaetztes_alter:
          type: integer
          x-ui-control: number
          x-ui-order: 17
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-placeholder: "z.B. 40"
          x-ui-label: "Geschätztes Alter in Jahren"

        gesundheitszustand:
          type: string
          x-ui-control: select
          x-ui-order: 18
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-required: true
          x-ui-label: "Gesundheitszustand des Baumes"
          x-ui-options: ["Gesund","Leicht geschädigt","Stark geschädigt","Abgestorben","Krankheitsbefall erkennbar"]

        standort:
          type: string
          x-ui-control: textarea
          x-ui-order: 19
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-required: true
          x-ui-placeholder: "Genaue Beschreibung z.B. 3m von der Grundstücksgrenze, neben der Garage..."
          x-ui-label: "Genaue Lage des Baumes auf dem Grundstück"

        denkmalschutz:
          type: boolean
          x-ui-control: checkbox
          x-ui-order: 20
          x-ui-group: "Abschnitt 4 - Angaben zum Baum"
          x-ui-label: "Steht der Baum unter Denkmalschutz oder in einem Landschaftsschutzgebiet?"

        # ─── ABSCHNITT 5: BEGRÜNDUNG UND MASSNAHME ──────────────────────────
        massnahme:
          type: string
          x-ui-control: select
          x-ui-order: 21
          x-ui-group: "Abschnitt 5 - Begründung und Maßnahme"
          x-ui-required: true
          x-ui-label: "Beantragte Maßnahme"
          x-ui-options: ["Fällung","Rückschnitt","Kronenpflege","Notfällung (akute Gefahr)"]

        begruendung:
          type: string
          x-ui-control: select
          x-ui-order: 22
          x-ui-group: "Abschnitt 5 - Begründung und Maßnahme"
          x-ui-required: true
          x-ui-label: "Hauptgrund für den Antrag"
          x-ui-options: ["Gefahr durch morsche Äste oder Wurzeln","Schäden an Gebäuden","Krankheitsbefall","Bauvorhaben","Lichtmangel / Verschattung","Sonstiges"]

        begruendung_details:
          type: string
          x-ui-control: textarea
          x-ui-order: 23
          x-ui-group: "Abschnitt 5 - Begründung und Maßnahme"
          x-ui-required: true
          x-ui-placeholder: "Bitte beschreiben Sie den Grund für Ihren Antrag ausführlich..."
          x-ui-label: "Ausführliche Begründung"

        geplantes_datum:
          type: string
          x-ui-control: date
          x-ui-order: 24
          x-ui-group: "Abschnitt 5 - Begründung und Maßnahme"
          x-ui-label: "Gewünschter Zeitpunkt der Maßnahme"

        ersatzpflanzung_geplant:
          type: boolean
          x-ui-control: checkbox
          x-ui-order: 25
          x-ui-group: "Abschnitt 5 - Begründung und Maßnahme"
          x-ui-label: "Eine Ersatzpflanzung ist geplant"

        ersatzpflanzung_art:
          type: string
          x-ui-control: input
          x-ui-order: 26
          x-ui-group: "Abschnitt 5 - Begründung und Maßnahme"
          x-ui-placeholder: "z.B. Winterlinde, Feldahorn"
          x-ui-label: "Art der geplanten Ersatzpflanzung (falls zutreffend)"

        # ─── ABSCHNITT 6: DOKUMENTE ─────────────────────────────────────────
        lageplan:
          type: string
          x-ui-control: file
          x-ui-order: 27
          x-ui-group: "Abschnitt 6 - Dokumente"
          x-ui-label: "Lageplan des Grundstücks mit Baumstandort (PDF)"

        fotos_baum:
          type: string
          x-ui-control: file
          x-ui-order: 28
          x-ui-group: "Abschnitt 6 - Dokumente"
          x-ui-label: "Aktuelle Fotos des Baumes (JPG/PNG)"

        gutachten:
          type: string
          x-ui-control: file
          x-ui-order: 29
          x-ui-group: "Abschnitt 6 - Dokumente"
          x-ui-label: "Baumgutachten, falls bereits vorhanden (PDF)"

        eigentuemernachweis:
          type: string
          x-ui-control: file
          x-ui-order: 30
          x-ui-group: "Abschnitt 6 - Dokumente"
          x-ui-label: "Grundbuchauszug oder Eigentümernachweis (PDF)"

        # ─── ABSCHNITT 7: SONSTIGE ANGABEN ──────────────────────────────────
        nachbarn_informiert:
          type: boolean
          x-ui-control: checkbox
          x-ui-order: 31
          x-ui-group: "Abschnitt 7 - Sonstige Angaben"
          x-ui-label: "Angrenzende Nachbarn wurden über den Antrag informiert"

        bemerkungen:
          type: string
          x-ui-control: textarea
          x-ui-order: 32
          x-ui-group: "Abschnitt 7 - Sonstige Angaben"
          x-ui-placeholder: "Weitere Anmerkungen zu Ihrem Antrag..."
          x-ui-label: "Zusätzliche Bemerkungen"

        datenschutz_zustimmung:
          type: boolean
          x-ui-control: checkbox
          x-ui-order: 33
          x-ui-group: "Abschnitt 7 - Sonstige Angaben"
          x-ui-required: true
          x-ui-label: "Ich stimme der Verarbeitung meiner Daten gemäß Datenschutzgrundverordnung (DSGVO) zu"

        richtigkeit_bestaetigung:
          type: boolean
          x-ui-control: checkbox
          x-ui-order: 34
          x-ui-group: "Abschnitt 7 - Sonstige Angaben"
          x-ui-required: true
          x-ui-label: "Ich bestätige, dass alle Angaben wahrheitsgemäß und vollständig sind"