openapi: "3.0.0"
info:
  title: Baumfaellantrag
  version: "1.0.0"

paths:
  /baumfaellung:
    get:
      operationId: getBaumfaellungForm
      summary: Baumfällantrag anzeigen
      responses:
        "200":
          description: Formular anzeigen
    post:
      operationId: createBaumfaellung
      summary: Baumfällantrag einreichen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Baumfaellung"
      responses:
        "201":
          description: Antrag erstellt

  /baumfaellung/{id}:
    get:
      operationId: getBaumfaellungById
      summary: Antrag nach ID abrufen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Antrag gefunden
    delete:
      operationId: deleteBaumfaellungById
      summary: Antrag löschen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Antrag gelöscht

components:
  schemas:
    Baumfaellung:
      type: object
      x-label: "form"
      properties:
        vorname:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 1
