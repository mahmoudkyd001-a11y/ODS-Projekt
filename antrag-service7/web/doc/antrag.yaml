openapi: "3.0.0"
info:
  title: Antrag
  version: "1.0.0"

paths:
  /antrag:
    get:
      operationId: getAntragForm
      summary: Antragsformular anzeigen
      responses:
        "200":
          description: Formular anzeigen
    post:
      operationId: createAntrag
      summary: Antrag einreichen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Antrag"
      responses:
        "201":
          description: Antrag erstellt

components:
  schemas:
    Antrag:
      type: object
      x-label: "form"
      properties:
        vorname:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 1
        nachname:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 2
        email:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-order: 3
        begruendung:
          type: string
          x-ui-control: "textarea"
          x-ui-order: 4
        dokument:
          type: string
          x-ui-control: "file"
          x-ui-order: 5