openapi: "3.0.0"
info:
  title: Baumfaellantrag
  version: "1.0.0"

paths:
  /baumfaellung:
    get:
      operationId: getBaumfaellungForm
      summary: Baumfällantrag anzeigen
      responses:
        "200":
          description: Formular anzeigen
    post:
      operationId: createBaumfaellung
      summary: Baumfällantrag einreichen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Baumfaellung"
      responses:
        "201":
          description: Antrag erstellt

components:
  schemas:
    Baumfaellung:
      type: object
      x-label: "form"
      properties:
        vorname:
          type: string
          x-ui-order: 1
        nachname:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
          x-ui-order: 2
        email:
          type: string
          x-ui-required: true
          x-ui-group: "personal"
        adresse:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "personal"
        baumart:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "baum"
        baumhoehe:
          x-ui-required: true
        baumumfang:
          type: integer
          x-ui-group: "baum"
        standort:
          type: string
          x-ui-required: true
        eigentuemer:
          type: string
          x-ui-control: "input"
          x-ui-required: true
          x-ui-group: "baum"
        denkmalschutz:
          type: boolean
          x-ui-control: "checkbox"
          x-ui-group: "baum"
        begruendung:
          type: string
          x-ui-control: "textarea"
          x-ui-required: true
        massnahme:
          type: string
          x-ui-control: "select"
          x-ui-required: true
        dokument:
          type: string
          x-ui-control: "file"
        fotos:
          type: string
          x-ui-control: "file"